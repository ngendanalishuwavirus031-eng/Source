<!DOCTYPE html>
<html>
<head>
<title>Lecturer Dashboard</title>
<link rel="stylesheet" href="assets/style.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="assets/firebase-config.js"></script>
</head>
<body>
<div class="navbar">
  <h2>👨‍🏫 Lecturer Portal</h2>
  <button onclick="auth.signOut().then(()=>window.location='login.html')">Logout</button>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('uploadBook')">📚 Upload Book</button>
    <button class="tab-btn" onclick="showTab('postAssignment')">📝 Post Assignment</button>
    <button class="tab-btn" onclick="showTab('createQuiz')">🧠 Create Quiz</button>
    <button class="tab-btn" onclick="showTab('grade')">✅ Grade Submissions</button>
    <button class="tab-btn" onclick="showTab('enterResults')">📊 Enter Exam Results</button>
  </div>

  <div id="uploadBook" class="tab-content active">
    <h3>Upload a Book / Learning Material</h3>
    <select id="bookCourse"></select>
    <input id="bookTitle" placeholder="Book Title">
    <input id="bookAuthor" placeholder="Author">
    <input type="file" id="bookFile">
    <button class="submit" onclick="uploadBook()">Upload</button>
  </div>

  <div id="postAssignment" class="tab-content">
    <h3>Post New Assignment</h3>
    <select id="assCourse"></select>
    <input id="assTitle" placeholder="Assignment Title">
    <textarea id="assDesc" placeholder="Description/Instructions"></textarea>
    <input type="date" id="assDue">
    <input type="file" id="assFile">
    <button class="submit" onclick="postAssignment()">Post Assignment</button>
  </div>

  <div id="createQuiz" class="tab-content">
    <h3>Create Quiz</h3>
    <select id="quizCourse"></select>
    <input id="quizTitle" placeholder="Quiz Title">
    <div id="questionBuilder"></div>
    <button class="submit" style="background:#555;" onclick="addQuestion()">+ Add Question</button>
    <button class="submit" onclick="saveQuiz()">Save Quiz</button>
  </div>

  <div id="grade" class="tab-content">
    <h3>Pending Submissions</h3>
    <div id="submissionsList"></div>
  </div>

  <div id="enterResults" class="tab-content">
    <h3>Enter End of Term / Final Exam Results</h3>
    <select id="resultCourse"></select>
    <input id="resultStudentId" placeholder="Student ID (e.g MIM123456)">
    <input id="resultSubject" placeholder="Subject Name">
    <select id="resultType">
      <option value="End of Term">End of Term</option>
      <option value="Final Exam">Final Exam</option>
    </select>
    <input id="resultScore" type="number" placeholder="Score (%)">
    <button class="submit" onclick="enterResult()">Save Result</button>
  </div>
</div>

<script>
function showTab(id){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

let currentUser;
auth.onAuthStateChanged(user => {
  if(!user){ window.location='login.html'; return; }
  currentUser = user;
  populateCourseDropdowns();
  loadSubmissions();
});

function populateCourseDropdowns(){
  ['bookCourse','assCourse','quizCourse','resultCourse'].forEach(id => {
    const sel = document.getElementById(id);
    COURSES.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id; opt.text = c.name;
      sel.appendChild(opt);
    });
  });
}

// ---- Upload Book ----
function uploadBook(){
  const file = document.getElementById('bookFile').files[0];
  const courseId = document.getElementById('bookCourse').value;
  const title = document.getElementById('bookTitle').value;
  const author = document.getElementById('bookAuthor').value;
  if(!file) return alert('Choose a file');

  const ref = storage.ref(`library/${Date.now()}_${file.name}`);
  ref.put(file).then(s => s.ref.getDownloadURL()).then(url => {
    return db.collection('library').add({
      title, author, courseId, fileURL: url, uploadedBy: currentUser.uid
    });
  }).then(() => alert('Book uploaded successfully!'));
}

// ---- Post Assignment ----
function postAssignment(){
  const file = document.getElementById('assFile').files[0];
  const courseId = document.getElementById('assCourse').value;
  const title = document.getElementById('assTitle').value;
  const description = document.getElementById('assDesc').value;
  const dueDate = document.getElementById('assDue').value;

  const save = (fileURL) => db.collection('assignments').add({
    title, description, dueDate, courseId, fileURL: fileURL||'', lecturerId: currentUser.uid
  }).then(()=> alert('Assignment posted!'));

  if(file){
    const ref = storage.ref(`assignments/${Date.now()}_${file.name}`);
    ref.put(file).then(s=>s.ref.getDownloadURL()).then(save);
  } else { save(null); }
}

// ---- Quiz Builder ----
let questions = [];
function addQuestion(){
  const qIndex = questions.length;
  questions.push({question:'', options:['','','',''], correctAnswer:''});
  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `
    <input placeholder="Question ${qIndex+1}" onchange="questions[${qIndex}].question=this.value">
    <input placeholder="Option 1" onchange="questions[${qIndex}].options[0]=this.value">
    <input placeholder="Option 2" onchange="questions[${qIndex}].options[1]=this.value">
    <input placeholder="Option 3" onchange="questions[${qIndex}].options[2]=this.value">
    <input placeholder="Option 4" onchange="questions[${qIndex}].options[3]=this.value">
    <input placeholder="Correct Answer (exact text)" onchange="questions[${qIndex}].correctAnswer=this.value">
  `;
  document.getElementById('questionBuilder').appendChild(div);
}

function saveQuiz(){
  const courseId = document.getElementById('quizCourse').value;
  const title = document.getElementById('quizTitle').value;
  db.collection('quizzes').add({
    title, courseId, questions, lecturerId: currentUser.uid
  }).then(() => { alert('Quiz created!'); questions=[]; document.getElementById('questionBuilder').innerHTML=''; });
}

// ---- Grade Assignments ----
function loadSubmissions(){
  db.collection('submissions').where('score','==', null).get().then(snap => {
    let html = '';
    snap.forEach(doc => {
      const s = doc.data();
      html += `<div class="card">
        <b>${s.studentName}</b> — Submitted: ${s.submittedDate}<br>
        <a href="${s.fileURL}" target="_blank">📎 View Submission</a><br>
        <input type="number" id="score-${doc.id}" placeholder="Score (%)">
        <textarea id="fb-${doc.id}" placeholder="Feedback"></textarea>
        <button class="submit" onclick="gradeSubmission('${doc.id}')">Save Grade</button>
      </div>`;
    });
    document.getElementById('submissionsList').innerHTML = html || '<p>No pending submissions.</p>';
  });
}

function gradeSubmission(id){
  const score = Number(document.getElementById(`score-${id}`).value);
  const feedback = document.getElementById(`fb-${id}`).value;
  db.collection('submissions').doc(id).get().then(doc => {
    const s = doc.data();
    db.collection('submissions').doc(id).update({ score, feedback });
    db.collection('results').add({
      studentId: s.studentId, type:'Assignment', title:'Assignment',
      score, grade: score>=50?'PASS':'FAIL'
    });
  }).then(() => { alert('Graded!'); loadSubmissions(); });
}

// ---- Enter Term/Final Results ----
function enterResult(){
  const courseId = document.getElementById('resultCourse').value;
  const studentId = document.getElementById('resultStudentId').value;
  const subject = document.getElementById('resultSubject').value;
  const type = document.getElementById('resultType').value;
  const score = Number(document.getElementById('resultScore').value);

  // Find student by studentId field
  db.collection('users').where('studentId','==', studentId).get().then(snap => {
    if(snap.empty) return alert('Student not found');
    const uid = snap.docs[0].id;
    db.collection('results').add({
      studentId: uid, courseId, subject, type, score,
      grade: score>=50 ? 'PASS':'FAIL'
    }).then(() => alert('Result saved!'));
  });
}
</script>
</body>
</html>
