<!DOCTYPE html>
<html>
<head>
<title>Accountant Dashboard</title>
<link rel="stylesheet" href="assets/style.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="assets/firebase-config.js"></script>
</head>
<body>
<div class="navbar">
  <h2>💰 Accountant Portal</h2>
  <button onclick="auth.signOut().then(()=>window.location='login.html')">Logout</button>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('recordPayment')">Record Payment</button>
    <button class="tab-btn" onclick="showTab('allFees')">All Student Fees</button>
  </div>

  <div id="recordPayment" class="tab-content active">
    <h3>Record a Fee Payment</h3>
    <input id="payStudentId" placeholder="Student ID (e.g MIM123456)">
    <input id="payAmount" type="number" placeholder="Amount (K)">
    <select id="payMethod">
      <option>Cash</option><option>Mobile Money</option><option>Bank Transfer</option>
    </select>
    <button class="submit" onclick="recordPayment()">Save Payment</button>
    <p id="payMsg"></p>
  </div>

  <div id="allFees" class="tab-content">
    <h3>Fee Records</h3>
    <table>
      <thead><tr><th>Student ID</th><th>Name</th><th>Course</th><th>Due</th><th>Paid</th><th>Balance</th></tr></thead>
      <tbody id="feesTable"></tbody>
    </table>
  </div>
</div>

<script>
function showTab(id){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

auth.onAuthStateChanged(user => { if(!user) window.location='login.html'; else loadAllFees(); });

function recordPayment(){
  const studentId = document.getElementById('payStudentId').value;
  const amount = Number(document.getElementById('payAmount').value);
  const method = document.getElementById('payMethod').value;

  db.collection('users').where('studentId','==', studentId).get().then(snap => {
    if(snap.empty){ document.getElementById('payMsg').innerText = 'Student not found'; return; }
    const uid = snap.docs[0].id;
    const feeRef = db.collection('fees').doc(uid);
    feeRef.get().then(doc => {
      const data = doc.data();
      const payments = data.payments || [];
      payments.push({ date: new Date().toLocaleDateString(), amount, method });
      feeRef.update({
        amountPaid: (data.amountPaid || 0) + amount,
        payments
      }).then(() => {
        document.getElementById('payMsg').innerText = 'Payment recorded!';
        loadAllFees();
      });
    });
  });
}

function loadAllFees(){
  db.collection('fees').get().then(snap => {
    let html = '';
    snap.forEach(doc => {
      const f = doc.data();
      const balance = f.amountDue - f.amountPaid;
      html += `<tr><td>${f.studentId}</td><td>${f.name}</td><td>${f.courseName}</td>
        <td>K${f.amountDue}</td><td>K${f.amountPaid}</td>
        <td style="color:${balance>0?'red':'green'}">K${balance}</td></tr>`;
    });
    document.getElementById('feesTable').innerHTML = html;
  });
}
</script>
</body>
</html>
