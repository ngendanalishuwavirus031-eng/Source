<!DOCTYPE html>
<html>
<head>
<title>Student Dashboard</title>
<link rel="stylesheet" href="assets/style.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="assets/firebase-config.js"></script>
</head>
<body>
<div class="navbar">
  <h2>🎓 Student Portal - <span id="studentName"></span></h2>
  <button onclick="auth.signOut().then(()=>window.location='login.html')">Logout</button>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('library')">📚 Library</button>
    <button class="tab-btn" onclick="showTab('assignments')">📝 Assignments</button>
    <button class="tab-btn" onclick="showTab('quizzes')">🧠 Quizzes</button>
    <button class="tab-btn" onclick="showTab('results')">📊 Results</button>
    <button class="tab-btn" onclick="showTab('fees')">💰 Fees</button>
  </div>

  <div id="library" class="tab-content active">
    <h3>Course Library</h3>
    <div id="bookList"></div>
  </div>

  <div id="assignments" class="tab-content">
    <h3>My Assignments</h3>
    <div id="assignmentList"></div>
  </div>

  <div id="quizzes" class="tab-content">
    <h3>Available Quizzes</h3>
    <div id="quizList"></div>
  </div>

  <div id="results" class="tab-content">
    <h3>My Results</h3>
    <table>
      <thead><tr><th>Type</th><th>Title/Subject</th><th>Score</th><th>Grade</th></tr></thead>
      <tbody id="resultsTable"></tbody>
    </table>
  </div>

  <div id="fees" class="tab-content">
    <h3>Fee Statement</h3>
    <div id="feeInfo" class="card"></div>
    <h4>Payment History</h4>
    <table>
      <thead><tr><th>Date</th><th>Amount</th><th>Method</th></tr></thead>
      <tbody id="paymentHistory"></tbody>
    </table>
  </div>
</div>

<script>
let currentUser, userData;

function showTab(id){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

auth.onAuthStateChanged(user => {
  if(!user){ window.location='login.html'; return; }
  currentUser = user;
  db.collection('users').doc(user.uid).get().then(doc => {
    userData = doc.data();
    document.getElementById('studentName').innerText = userData.name;
    loadLibrary(); loadAssignments(); loadQuizzes(); loadResults(); loadFees();
  });
});

function loadLibrary(){
  db.collection('library').where('courseId','==', userData.courseId).get().then(snap => {
    let html = '';
    snap.forEach(doc => {
      const b = doc.data();
      html += `<div class="card"><b>${b.title}</b> by ${b.author}<br>
        <a href="${b.fileURL}" target="_blank"><button class="submit" style="width:auto;padding:6px 14px;">Download</button></a></div>`;
    });
    document.getElementById('bookList').innerHTML = html || '<p>No books available yet.</p>';
  });
}

function loadAssignments(){
  db.collection('assignments').where('courseId','==', userData.courseId).get().then(snap => {
    let html = '';
    snap.forEach(doc => {
      const a = doc.data();
      html += `<div class="card">
        <b>${a.title}</b> — Due: ${a.dueDate}<br>
        <p>${a.description}</p>
        ${a.fileURL ? `<a href="${a.fileURL}" target="_blank">📎 View Attachment</a><br>` : ''}
        <input type="file" id="file-${doc.id}">
        <button class="submit" onclick="submitAssignment('${doc.id}')">Submit</button>
      </div>`;
    });
    document.getElementById('assignmentList').innerHTML = html || '<p>No assignments posted yet.</p>';
  });
}

function submitAssignment(assignmentId){
  const file = document.getElementById(`file-${assignmentId}`).files[0];
  if(!file) return alert('Choose a file first');
  const ref = storage.ref(`submissions/${currentUser.uid}_${assignmentId}_${file.name}`);
  ref.put(file).then(snap => snap.ref.getDownloadURL()).then(url => {
    return db.collection('submissions').add({
      assignmentId, studentId: currentUser.uid, studentName: userData.name,
      fileURL: url, submittedDate: new Date().toLocaleDateString(),
      score: null, feedback: ''
    });
  }).then(() => alert('Assignment submitted successfully!'));
}

function loadQuizzes(){
  db.collection('quizzes').where('courseId','==', userData.courseId).get().then(snap => {
    let html = '';
    snap.forEach(doc => {
      const q = doc.data();
      html += `<div class="card"><b>${q.title}</b> — ${q.questions.length} Questions<br>
        <button class="submit" style="width:auto;padding:6px 14px;" onclick="takeQuiz('${doc.id}')">Start Quiz</button></div>`;
    });
    document.getElementById('quizList').innerHTML = html || '<p>No quizzes available.</p>';
  });
}

function takeQuiz(quizId){
  db.collection('quizzes').doc(quizId).get().then(doc => {
    const q = doc.data();
    let answers = [];
    q.questions.forEach((ques,i) => {
      const ans = prompt(`Q${i+1}: ${ques.question}\nOptions: ${ques.options.join(', ')}`);
      answers.push(ans);
    });
    // Auto-grade
    let score = 0;
    q.questions.forEach((ques,i) => { if(answers[i] && answers[i].trim().toLowerCase() === ques.correctAnswer.toLowerCase()) score++; });
    const percentage = Math.round((score/q.questions.length)*100);

    db.collection('quizAttempts').add({
      quizId, studentId: currentUser.uid, studentName: userData.name,
      score: percentage, submittedDate: new Date().toLocaleDateString()
    });
    db.collection('results').add({
      studentId: currentUser.uid, courseId: userData.courseId,
      type:'Quiz', title: q.title, score: percentage,
      grade: percentage>=50 ? 'PASS':'FAIL'
    });
    alert(`Quiz submitted! You scored ${percentage}%`);
    loadResults();
  });
}

function loadResults(){
  db.collection('results').where('studentId','==', currentUser.uid).get().then(snap => {
    let html = '';
    snap.forEach(doc => {
      const r = doc.data();
      html += `<tr><td>${r.type}</td><td>${r.title || r.subject}</td><td>${r.score}%</td>
        <td><span class="${r.grade==='PASS'?'badge-pass':'badge-fail'}">${r.grade}</span></td></tr>`;
    });
    document.getElementById('resultsTable').innerHTML = html || '<tr><td colspan="4">No results yet.</td></tr>';
  });
}

function loadFees(){
  db.collection('fees').doc(currentUser.uid).get().then(doc => {
    const f = doc.data();
    const balance = f.amountDue - f.amountPaid;
    document.getElementById('feeInfo').innerHTML = `
      <p><b>Course:</b> ${f.courseName}</p>
      <p><b>Term:</b> ${f.term}</p>
      <p><b>Amount Due:</b> K${f.amountDue}</p>
      <p><b>Amount Paid:</b> K${f.amountPaid}</p>
      <p><b>Balance:</b> <span style="color:${balance>0?'red':'green'}">K${balance}</span></p>`;
    let rows = '';
    (f.payments || []).forEach(p => {
      rows += `<tr><td>${p.date}</td><td>K${p.amount}</td><td>${p.method}</td></tr>`;
    });
    document.getElementById('paymentHistory').innerHTML = rows || '<tr><td colspan="3">No payments recorded.</td></tr>';
  });
}
</script>
</body>
</html>
