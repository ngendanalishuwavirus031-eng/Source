<!DOCTYPE html>
<html>
<head>
<title>Enroll - MIM Portal</title>
<link rel="stylesheet" href="assets/style.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="assets/firebase-config.js"></script>
</head>
<body>
<div class="auth-box" style="max-width:480px;">
  <h2>Student Enrollment</h2>
  <input id="name" placeholder="Full Name">
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <select id="course"></select>
  <button class="submit" onclick="registerStudent()">Enroll Now</button>
  <p id="msg" style="color:red;"></p>
</div>

<script>
// Populate course dropdown from brochure list
const courseSelect = document.getElementById('course');
COURSES.forEach(c => {
  const opt = document.createElement('option');
  opt.value = c.id;
  opt.text = `${c.name} (K${c.fee}/term)`;
  courseSelect.appendChild(opt);
});

function registerStudent(){
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;
  const courseId = document.getElementById('course').value;
  const course = COURSES.find(c => c.id === courseId);

  auth.createUserWithEmailAndPassword(email, pass)
  .then(cred => {
    const studentId = 'MIM' + Math.floor(100000 + Math.random()*900000);
    return db.collection('users').doc(cred.user.uid).set({
      name, email, role:'student', studentId,
      courseId, courseName: course.name
    }).then(() => {
      // Initialize fee record
      return db.collection('fees').doc(cred.user.uid).set({
        studentId, name, courseName: course.name,
        term: 'Term 1', amountDue: course.fee, amountPaid: 0,
        payments: []
      });
    });
  })
  .then(() => { alert('Enrollment successful! Please login.'); window.location='login.html'; })
  .catch(err => document.getElementById('msg').innerText = err.message);
}
</script>
</body>
</html>
